name: Build HortiScan APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Find and unzip the app project
        run: |
          set -e
          ZIP=$(find . -maxdepth 2 -name '*.zip' | head -n1)
          if [ -z "$ZIP" ]; then
            echo "ERROR: No .zip file found in the repository."
            echo "Upload hortiscan-android.zip to the repo, then re-run."
            ls -la
            exit 1
          fi
          echo "Found project zip: $ZIP"
          unzip -o "$ZIP" -d app-src
          if [ ! -f app-src/package.json ]; then
            INNER=$(find app-src -maxdepth 3 -name package.json | head -n1)
            if [ -n "$INNER" ]; then
              DIR=$(dirname "$INNER")
              echo "Flattening project from: $DIR"
              shopt -s dotglob
              mv "$DIR"/* app-src/ 2>/dev/null || true
            fi
          fi
          echo "--- app-src contents ---"
          ls -la app-src
          test -f app-src/package.json || { echo "ERROR: package.json not found after unzip."; exit 1; }

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        working-directory: app-src
        run: npm install

      - name: Generate third-party licence file
        working-directory: app-src
        run: |
          mkdir -p public
          npx --yes generate-license-file --input package.json --output public/THIRD-PARTY-LICENSES.txt --overwrite || echo "Using bundled baseline licences"

      - name: Build web assets
        working-directory: app-src
        run: npm run build

      - name: Add Android platform
        working-directory: app-src
        run: |
          npx cap add android
          npx cap sync android

      - name: Point Gradle at the Android SDK
        working-directory: app-src/android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Add camera and location permissions
        working-directory: app-src/android
        run: |
          MANIFEST=app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <uses-feature android:name="android.hardware.camera" android:required="false"/>\n    <application#' "$MANIFEST"

      - name: Build debug APK
        working-directory: app-src/android
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: HortiScan-debug-apk
          path: app-src/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: HortiScan build ${{ github.run_number }}
          files: app-src/android/app/build/outputs/apk/debug/app-debug.apk
